<script type="module">

// ═══════════════════════════════════════════════

// ═══════════════════════════════════════════════

  { q:8,r:-1,tileType:'grass',    env:['torch_lit','candle_thin'],              occupant:'femio',     label:'Itaca · Femio' },

  { q:12,r:-4,tileType:'stone_dark',env:['ruins'],                              occupant:'ruinas_troya',label:'Troya · Ruinas' },

  { q:5, r:4, tileType:'sand_A',   env:['barrel_small','box_small'],            occupant:null,        label:'Pilos · Puerto' },
  { q:7, r:5, tileType:'dirt',     env:['banner_yellow','torch'],               occupant:'menelao',   label:'Esparta · Menelao' },
  { q:3, r:-2,tileType:'sand_B',   env:['banner_green'],                        occupant:null,        label:'Tafos · Puerto' },
  { q:9, r:2, tileType:'grass',    env:['banner_patternC_red'],                 occupant:null,        label:'Duliquio' },
  { q:10,r:1, tileType:'grass',    env:['banner_patternC_red'],                 occupant:null,        label:'Samé' },
  { q:9,r:-2,tileType:'grass',    env:['banner_patternC_red'],                 occupant:null,        label:'Zacinto' },
  { q:10,r:-2,tileType:'road',     env:[],                                      occupant:null,        label:'Camino Troya' },
  { q:7, r:-2,tileType:'road',     env:[],                                      occupant:null,        label:'Camino Tafos' },
  { q:6,r:-1,tileType:'road',     env:[],                                      occupant:null,        label:'Camino costero' },
  { q:5, r:2, tileType:'road',     env:[],                                      occupant:null,        label:'Camino Pilos' },
  { q:6, r:3, tileType:'road',     env:[],                                      occupant:null,        label:'Camino Esparta' },
  { q:6, r:4, tileType:'road',     env:[],                                      occupant:null,        label:'Camino Esparta' },
  { q:4, r:3, tileType:'water',    env:[],                                      occupant:null,        label:'Mar Jónico' },
  { q:3, r:3, tileType:'water',    env:[],                                      occupant:null,        label:'Mar Jónico' }
];

const TILE_REGISTRY = {
  hex_grass:   { file:'hex_grass.gltf',   bin:'hex_grass.bin' },
  hex_road_A:  { file:'hex_road_A.gltf',  bin:'hex_road_A.bin' },
  hex_river_A: { file:'hex_river_A.gltf', bin:'hex_river_A.bin' }
};
const TILE_MAP = {
  grass:'hex_grass', road:'hex_road_A', water:'hex_river_A',
  stone:'hex_grass', stone_dark:'hex_grass', sand_A:'hex_grass',
  sand_B:'hex_grass', dirt:'hex_grass', mountain:'hex_grass'
};
const OCCUPANT_REGISTRY = {
  building_castle_green:{file:'building_castle_green.gltf',bin:'building_castle_green.bin',type:'building'},
  building_bridge_A:    {file:'building_bridge_A.gltf',    bin:'building_bridge_A.bin',    type:'building'},
  building_bridge_B:    {file:'building_bridge_B.gltf',    bin:'building_bridge_B.bin',    type:'building'},
  building_dirt:        {file:'building_dirt.gltf',        bin:'building_dirt.bin',        type:'building'},
  building_destroyed:   {file:'building_destroyed.gltf',   bin:'building_destroyed.bin',   type:'building'},
  building_grain:       {file:'building_grain.gltf',       bin:'building_grain.bin',       type:'building'},
  mountain_B_grass_trees:{file:'mountain_B_grass_trees.gltf',bin:'mountain_B_grass_trees.bin',type:'mountain'},
  coin_stack_large:     {file:'coin_stack_large.gltf',     bin:'coin_stack_large.bin',     type:'treasure'}
};
const OCCUPANT_MAP = {
  palacio_ulises:'building_castle_green', ruinas_troya:'building_destroyed',
  nestor:'building_dirt', menelao:'building_bridge_A', ogigia_isla:'building_dirt'
};

// ═══════════════════════════════════════════════
// 2. THREE.JS SETUP (low-poly-medieval skill)
// ═══════════════════════════════════════════════

const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
const SKY = 0x1a252c;
scene.background = new THREE.Color(SKY);
scene.fog = new THREE.FogExp2(SKY, 0.015);

const camera = new THREE.PerspectiveCamera(52, innerWidth/innerHeight, 0.1, 200);
camera.position.set(6, 16, 20);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.06;
controls.maxPolarAngle = Math.PI / 2.1;
controls.target.set(3, 0, 1);

scene.add(new THREE.AmbientLight(0x8fb0d0, 0.9));

const sun = new THREE.DirectionalLight(0xffe5b0, 1.6);
sun.position.set(10, 20, 12);
sun.castShadow = true;
sun.shadow.mapSize.set(1024, 1024);
sun.shadow.camera.left = -30; sun.shadow.camera.right = 30;
sun.shadow.camera.top = 30; sun.shadow.camera.bottom = -30;
sun.shadow.camera.near = 1; sun.shadow.camera.far = 80;
sun.shadow.camera.updateProjectionMatrix();
scene.add(sun);

const fill = new THREE.DirectionalLight(0x5580a0, 0.35);
fill.position.set(-6, 6, -10);
scene.add(fill);

window.addEventListener('resize', () => {
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

// ═══════════════════════════════════════════════
// 3. CORE FUNCTIONS
// ═══════════════════════════════════════════════

function axialToWorld(q, r) {
  return new THREE.Vector3(HEX_W*(q+r*0.5), 0, HEX_H*r);
}

// Log
const logEl = document.getElementById('log');
const logBuf = [];
function L(t, c='') { logBuf.push(c ? `<span class="${c}">${t}</span>` : t); logEl.innerHTML = logBuf.join('<br>'); logEl.scrollTop=logEl.scrollHeight; }
function SEP() { L('─'.repeat(30),'sep'); }

// GLTF loader
const loader = new GLTFLoader();
const gltfCache = new Map();
function loadGLTF(p) {
  if (gltfCache.has(p)) return gltfCache.get(p);
  const prom = new Promise((res,rej)=>loader.load(p,res,void 0,e=>rej(new Error(e.message||'load error'))));
  gltfCache.set(p, prom);
  return prom;
}
async function measurePair(g,b) {
  try { const [a1,a2]=await Promise.all([fetch(g),fetch(b)]); const [b1,b2]=await Promise.all([a1.arrayBuffer(),a2.arrayBuffer()]); return b1.byteLength+b2.byteLength; } catch(_){return 0;}
}

// InstancedMesh builder
function buildInstancedLayer(gltf, positions, key) {
  const ms = [];
  gltf.scene.traverse(c=>{if(c.isMesh)ms.push(c);});
  if(!ms.length) return null;
  const g = new THREE.Group(), d = new THREE.Object3D();
  ms.forEach(src=>{
    const inst = new THREE.InstancedMesh(src.geometry, src.material, positions.length);
    inst.userData.assetKey = key; inst.castShadow=true; inst.receiveShadow=true;
    positions.forEach((p,i)=>{ d.position.copy(p); d.rotation.y=((i*7)%6)*(Math.PI/3); d.updateMatrix(); inst.setMatrixAt(i,d.matrix); });
    inst.instanceMatrix.needsUpdate = true;
    g.add(inst);
  });
  return g;
}

function placeUnique(gltf, pos, key, sy=0) {
  const o = gltf.scene.clone(true);
  o.position.copy(pos); if(sy) o.position.y+=sy;
  o.traverse(n=>{ n.userData.assetKey=key; if(n.isMesh){n.castShadow=true;n.receiveShadow=true;} });
  return o;
}

// Canvas rounded rect helper (no roundRect for compat)
function roundRect(cx, x, y, w, h, r) {
  cx.beginPath();
  cx.moveTo(x+r, y); cx.lineTo(x+w-r, y);
  cx.quadraticCurveTo(x+w, y, x+w, y+r);
  cx.lineTo(x+w, y+h-r);
  cx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
  cx.lineTo(x+r, y+h);
  cx.quadraticCurveTo(x, y+h, x, y+h-r);
  cx.lineTo(x, y+r);
  cx.quadraticCurveTo(x, y, x+r, y);
  cx.closePath();
}

// Environment fallback meshes (L1)
function createFallback(assetId, pos) {
  const g = new THREE.Group();
  g.position.copy(pos); g.userData.assetKey=assetId;
  let m;
  const B = (w,h,d,c,r=0.8) => { const mm=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),new THREE.MeshStandardMaterial({color:c,roughness:r})); mm.castShadow=true; return mm; };
  const CYL = (rt,rb,h,c) => { const mm=new THREE.Mesh(new THREE.CylinderGeometry(rt,rb,h,6),new THREE.MeshStandardMaterial({color:c,roughness:0.9})); mm.castShadow=true; return mm; };

  switch(assetId) {
    case 'banner_blue': case 'banner_red': case 'banner_green':
    case 'banner_yellow': case 'banner_white': case 'banner_brown':
      const cMap = { banner_blue:0x4a7db5, banner_red:0xc0392b, banner_green:0x27ae60, banner_yellow:0xd4b87a, banner_white:0xd5d0c0, banner_brown:0x8a6e4b };
      m = B(0.06,0.35,0.20, cMap[assetId]||0x8a6e4b); m.position.y=0.2; g.add(m);
      g.add(CYL(0.015,0.02,0.4,0x5a4030).translateY(0.2));
      break;
    case 'banner_patternB_red': case 'banner_patternC_red': case 'banner_patternA_red':
      m = B(0.06,0.40,0.22,0xc0392b,0.7); m.position.y=0.22; g.add(m);
      break;
    case 'barrier': case 'barrier_half':
      m = B(assetId==='barrier'?0.08:0.04,0.20,0.25,0x5a4030); m.position.y=0.12; g.add(m);
      break;
    case 'torch': case 'torch_lit':
      g.add(CYL(0.015,0.02,0.35,0x5a4030).translateY(0.2));
      if(assetId==='torch_lit') {
        const fl = new THREE.Mesh(new THREE.SphereGeometry(0.04,4,4),new THREE.MeshStandardMaterial({color:0xff8800,emissive:0xff4400,emissiveIntensity:0.5}));
        fl.position.y=0.4; g.add(fl);
        const gl = new THREE.PointLight(0xff6600,0.3,1.5); gl.position.y=0.4; g.add(gl);
      }
      break;
    case 'candle': case 'candle_thin':
      g.add(CYL(0.015,0.02,0.08,0xf5e6c8).translateY(0.04));
      break;
    case 'barrel_small': case 'barrel_large':
      const r = assetId==='barrel_large'?0.08:0.05;
      g.add(CYL(r,r*1.1,0.14,0x6b4c3b).translateY(0.07));
      break;
    case 'box_small': case 'box_large':
      const s = assetId==='box_large'?0.08:0.05;
      m = B(s,s,s,0x7a5a3a); m.position.y=s/2; g.add(m);
      break;
    case 'pillar': case 'pillar_op':
      g.add(CYL(0.06,0.07,0.3,0x7a7a6a).translateY(0.15));
      break;
    case 'ruins':
      m = B(0.20,0.08,0.20,0x5a5040); m.position.y=0.04; g.add(m);
      const rb = new THREE.Mesh(new THREE.DodecahedronGeometry(0.04),new THREE.MeshStandardMaterial({color:0x4a4030,roughness:0.9}));
      rb.position.set(0.06,0.02,0.05); g.add(rb);
      break;
    default:
      m = B(0.04,0.04,0.04,0x8a7e65); m.position.y=0.02; g.add(m);
  }
  return g;
}

// Canvas label maker
function makeLabel(text, isDeity) {
  const c = document.createElement('canvas'); c.width=512; c.height=64;
  const cx = c.getContext('2d');
  cx.clearRect(0,0,512,64);
  roundRect(cx, 8, 8, 496, 48, 6);
  cx.fillStyle = 'rgba(0,0,0,0.55)'; cx.fill();
  cx.font = isDeity ? 'bold 24px Georgia' : '20px Georgia';
  cx.textAlign='center'; cx.textBaseline='middle';
  cx.fillStyle = isDeity ? '#e8d5a3' : '#c9b99a';
  cx.fillText(text, 256, 32);
  const tex = new THREE.CanvasTexture(c); tex.minFilter=THREE.LinearFilter;
  const sp = new THREE.Sprite(new THREE.SpriteMaterial({map:tex,transparent:true,depthWrite:false}));
  sp.scale.set(2.4,0.3,1); return sp;
}

function makeSmallLabel(text, color) {
  const c = document.createElement('canvas'); c.width=256; c.height=48;
  const cx = c.getContext('2d');
  cx.clearRect(0,0,256,48);
  roundRect(cx, 4, 4, 248, 40, 5);
  cx.fillStyle = 'rgba(0,0,0,0.50)'; cx.fill();
  cx.font = '16px Georgia'; cx.textAlign='center'; cx.textBaseline='middle';
  cx.fillStyle = color||'#c9b99a'; cx.fillText(text,128,24);
  const tex = new THREE.CanvasTexture(c); tex.minFilter=THREE.LinearFilter;
  const sp = new THREE.Sprite(new THREE.SpriteMaterial({map:tex,transparent:true,depthWrite:false}));
  sp.scale.set(1.2,0.22,1); return sp;
}

// ═══════════════════════════════════════════════
// 4. MAIN — BUILD THE WORLD
// ═══════════════════════════════════════════════

async function buildWorld() {
  const t0 = performance.now();
  let totalBytes = 0, totalDC = 0;

  L('κ Construyendo el mundo…','dim'); SEP();

  // Step A: Deduplicate tile types
  const tileTypes = [...new Set(CELLS.map(c=>TILE_MAP[c.tileType]))];
  L(`⌂ Tipos: ${tileTypes.join(', ')}`,'dim');

  // Step B: Load tile GLTFs
  const tileLoads = await Promise.allSettled(tileTypes.map(async stem=>{
    const e = TILE_REGISTRY[stem]; if(!e) throw Error(`No '${stem}'`);
    const [bytes,gltf] = await Promise.all([measurePair(e.file,e.bin), loadGLTF(e.file)]);
    return {stem,bytes,gltf};
  }));
  SEP(); const tileCache=new Map();
  tileLoads.forEach((r,i)=>{
    if(r.status==='rejected'){L(`✗ ${tileTypes[i]}: ${r.reason.message}`,'err');return;}
    tileCache.set(r.value.stem,r.value.gltf); totalBytes+=r.value.bytes;
    L(`✔ ${r.value.stem}`,'ok');
  });

  // Step C: InstancedMesh L0
  SEP(); L('ϟ Capa L0 (tiles)…','dim');
  const tileGroups = {};
  CELLS.forEach(c=>{
    const s=TILE_MAP[c.tileType]; if(!tileGroups[s])tileGroups[s]=[];
    tileGroups[s].push(axialToWorld(c.q,c.r));
  });
  Object.entries(tileGroups).forEach(([stem,poses])=>{
    const gltf=tileCache.get(stem); if(!gltf){L(`✗ sin GLTF ${stem}`,'warn');return;}
    const grp=buildInstancedLayer(gltf,poses,stem); if(grp){scene.add(grp);totalDC+=grp.children.length;L(`✔ L0 ${stem}: ${poses.length} insts · ${grp.children.length} DC`,'dim');}
  });

  // Step D: Load occupant GLTFs
  SEP(); L('ϟ Cargando ocupantes (L2)…','dim');
  const needed = [...new Set(CELLS.filter(c=>c.occupant&&OCCUPANT_MAP[c.occupant]).map(c=>OCCUPANT_MAP[c.occupant]))];
  needed.push('mountain_B_grass_trees');
  const occLoads = await Promise.allSettled(needed.map(async key=>{
    const e=OCCUPANT_REGISTRY[key]; if(!e)throw Error(`No '${key}'`);
    const [bytes,gltf]=await Promise.all([measurePair(e.file,e.bin),loadGLTF(e.file)]);
    return {key,bytes,gltf};
  }));
  const occCache=new Map();
  occLoads.forEach(r=>{
    if(r.status==='rejected'){L(`✗ ${r.reason.message}`,'err');return;}
    occCache.set(r.value.key,r.value.gltf); totalBytes+=r.value.bytes; L(`✔ ${r.value.key}`,'ok');
  });

  // Step E: Place occupants
  SEP(); L('ϟ Colocando ocupantes…','dim');
  CELLS.forEach(cell=>{
    if(!cell.occupant) return;
    const pos=axialToWorld(cell.q,cell.r), ak=OCCUPANT_MAP[cell.occupant];
    if(ak){
      const gltf=occCache.get(ak); if(gltf){scene.add(placeUnique(gltf,pos,ak,0));totalDC+=1;L(`✔ ${cell.occupant}`,'ok');}
    }
    if(cell.occupant==='jupiter'||cell.occupant==='minerva'||cell.occupant==='mercurio'){
      const th=occCache.get('coin_stack_large');
      if(th){const o=placeUnique(th,pos.clone().add(new THREE.Vector3(0,0,0.08)),cell.occupant,0.14);o.scale.set(0.4,0.4,0.4);scene.add(o);totalDC+=1;}
      if(cell.occupant==='jupiter'){const cl=occCache.get('mountain_B_grass_trees');if(cl){const o=placeUnique(cl,pos.clone().add(new THREE.Vector3(0,0.6,0)),'cloud',0);o.scale.set(0.3,0.3,0.3);scene.add(o);totalDC+=1;}}
    }
    if(cell.occupant==='ulises'){const hu=occCache.get('building_dirt');if(hu){const o=placeUnique(hu,pos,'hut',0);o.scale.set(0.5,0.5,0.5);scene.add(o);totalDC+=1;}}
  });
  const cumbre=CELLS.find(c=>c.q===-1&&c.r===1);
  if(cumbre){const pos=axialToWorld(cumbre.q,cumbre.r),mtn=occCache.get('mountain_B_grass_trees');if(mtn){const o=placeUnique(mtn,pos,'cumbre',0);o.scale.set(0.8,0.8,0.8);scene.add(o);totalDC+=1;L('✔ Cumbre del Olimpo','ok');}}

  // Step F: Place L1 environment
  SEP(); L('ϟ Colocando ambiente (L1)…','dim');
  CELLS.forEach(cell=>{
    if(!cell.env||!cell.env.length) return;
    const base=axialToWorld(cell.q,cell.r);
    cell.env.forEach((aid,idx)=>{
      const pos=base.clone().add(new THREE.Vector3((idx-(cell.env.length-1)/2)*0.12,0,0.05));
      scene.add(createFallback(aid,pos)); totalDC+=1;
    });
  });

  // Step G: Labels
  SEP(); L('ϟ Añadiendo etiquetas…','dim');
  [{q:0,r:0,t:'Olimpo',d:true},{q:8,r:0,t:'Itaca'},{q:-5,r:5,t:'Ogigia'},{q:12,r:-4,t:'Troya'},{q:5,r:3,t:'Pilos'},{q:7,r:5,t:'Esparta'}].forEach(lc=>{
    const p=axialToWorld(lc.q,lc.r),sp=makeLabel(lc.t,lc.d);sp.position.set(p.x,0.6,p.z);scene.add(sp);
  });
  [{q:0,r:0,t:'Júpiter',c:'#e8d5a3'},{q:0,r:1,t:'Minerva',c:'#7ab0e0'},{q:1,r:0,t:'Mercurio',c:'#f0c060'},
   {q:9,r:0,t:'Telémaco'},{q:9,r:-1,t:'Penélope'},{q:7,r:0,t:'Antinoo',c:'#e07050'},{q:8,r:-1,t:'Femio'},
   {q:-5,r:6,t:'Calipso',c:'#e8a0bf'},{q:-4,r:5,t:'Ulises',c:'#e8d5a3'},{q:7,r:5,t:'Menelao'},{q:5,r:3,t:'Néstor'}].forEach(cl=>{
    const p=axialToWorld(cl.q,cl.r),sp=makeSmallLabel(cl.t,cl.c);sp.position.set(p.x,0.45,p.z);scene.add(sp);
  });

  // Step H: Report
  SEP();
  L(`Χ ${(performance.now()-t0).toFixed(0)} ms · ${(totalBytes/1024).toFixed(0)} KB`,'ok');
  L(`Χ ~${totalDC} draw calls · ${CELLS.length} celdas, ${CELLS.filter(c=>c.occupant).length} ocupadas`,'dim');
  SEP(); L('✔ Mundo listo. La Odisea comienza.','ok');
  setTimeout(()=>{console.group('%cOdisea Canto I','color:#e8d5a3;font-weight:bold');
    console.log('Celdas:',CELLS.length,'Draw calls:',renderer.info.render.calls);
    console.log('Triángulos:',renderer.info.render.triangles);
    console.log('Geometrías:',renderer.info.memory.geometries);
    console.log('Texturas:',renderer.info.memory.textures);
    console.groupEnd();},1500);
}

// ═══════════════════════════════════════════════
// 5. RENDER LOOP
// ═══════════════════════════════════════════════

const fpsEl = document.getElementById('fps');
let lastT=performance.now(),frames=0;
renderer.setAnimationLoop(()=>{
  controls.update(); renderer.render(scene,camera); frames++;
  const n=performance.now();
  if(n-lastT>=1000){fpsEl.textContent=`${frames} fps`;fpsEl.style.color=frames>=50?'#6a9f5a':frames>=25?'#c9a84c':'#c95a4c';frames=0;lastT=n;}
});

buildWorld().catch(err=>{SEP();L(`☠ ${err.message}`,'err');console.error(err);});
</script>
</body>
</html>
