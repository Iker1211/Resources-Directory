// ── Seeded RNG ──────────────────────────────────
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
const R=mulberry32(4242);
const randScale=()=>0.82+R()*0.36;
const randRotY=()=>R()*Math.PI*2;
const randTilt=()=>(R()-0.5)*0.17;
const randSink=()=>-(0.10+R()*0.15);

// ── WORLD DATA (from odyssey-grammar armónico) ──
const HEX_W=1.82, HEX_H=1.575;
const BIOMES={
  olimpo:{c:{q:0,r:0},r:3,low:[0.30,0.25,0.22],mid:[0.50,0.45,0.38],high:[0.72,0.65,0.52]},
  itaca:{c:{q:8,r:0},r:4,low:[0.18,0.32,0.18],mid:[0.32,0.50,0.28],high:[0.60,0.72,0.45]},
  ogigia:{c:{q:-5,r:5},r:3,low:[0.08,0.20,0.32],mid:[0.12,0.30,0.42],high:[0.35,0.55,0.70]},
  troya:{c:{q:12,r:-4},r:3,low:[0.22,0.18,0.12],mid:[0.40,0.32,0.20],high:[0.65,0.42,0.22]},
  pilos:{c:{q:5,r:3},r:2,low:[0.50,0.45,0.30],mid:[0.65,0.60,0.45],high:[0.80,0.75,0.60]},
  esparta:{c:{q:7,r:5},r:2,low:[0.30,0.28,0.18],mid:[0.45,0.40,0.28],high:[0.70,0.60,0.42]},
  tafos:{c:{q:3,r:-2},r:2,low:[0.22,0.35,0.22],mid:[0.32,0.50,0.32],high:[0.50,0.70,0.50]}
};
const DEF_LOW=[0.20,0.25,0.20], DEF_MID=[0.40,0.50,0.35], DEF_HIGH=[0.70,0.75,0.55];
function getBiome(q,r){for(const b of Object.values(BIOMES)){if(Math.abs(q-b.c.q)<=b.r&&Math.abs(r-b.c.r)<=b.r)return b;}return null;}
function getBiomeColor(q,r,h){
  const b=getBiome(q,r);
  if(!b){const hn=Math.min(1,h/0.8);return DEF_LOW.map((v,i)=>v+(DEF_MID[i]-v)*hn);}
  const hn=Math.min(1,h/0.8);
  if(hn<0.3){const t=hn/0.3;return[b.low[0]+(b.mid[0]-b.low[0])*t,b.low[1]+(b.mid[1]-b.low[1])*t,b.low[2]+(b.mid[2]-b.low[2])*t];}
  const t=(hn-0.3)/0.7;return[b.mid[0]+(b.high[0]-b.mid[0])*t,b.mid[1]+(b.high[1]-b.mid[1])*t,b.mid[2]+(b.high[2]-b.mid[2])*t];
}

// ── ASSET REGISTRY — ONLY REAL GLTFs ────────────
const ASSETS={
  hex_grass:{f:'hex_grass.gltf',b:'hex_grass.bin',type:'tile'},
  hex_road_A:{f:'hex_road_A.gltf',b:'hex_road_A.bin',type:'tile'},

// ── THREE.JS SETUP ──────────────────────────────
const renderer=new THREE.WebGLRenderer({antialias:true});

sun.shadow.camera.top=35;sun.shadow.camera.bottom=-35;

// ── TERRAIN ──────────────────────────────────────
function buildTerrain(){
  const gw=28,gd=20,cw=1.6,cd=1.6,cols=gw,rows=gd,ox=-gw*cw/2,oz=-gd*cd/2+4;
  const verts=[],colors=[],indices=[];
  function getH(x,z){
    let h=0;
    for(const b of Object.values(BIOMES)){
      const bx=HEX_W*(b.c.q+b.c.r*0.5),bz=HEX_H*b.c.r;
      const dx=x-bx,dz=z-bz,dist=Math.sqrt(dx*dx+dz*dz),rad=b.r*HEX_W*1.2;
      if(dist<rad){const t=1-dist/rad;h+=t*t*0.5;if(dist>rad*0.5&&dist<rad)h+=((dist-rad*0.5)/(rad*0.5))*0.1*(1-t);}
    }
    h+=Math.abs(Math.sin(x*0.3)*Math.cos(z*0.4))*0.2+Math.abs(Math.cos(x*0.5)*Math.sin(z*0.35))*0.15;
    return Math.max(0,h);
  }
  for(let r=0;r<rows;r++){for(let c=0;c<cols;c++){
    const x=ox+c*cw,z=oz+r*cd,h=getH(x,z);
    verts.push(x,h,z);
    const q=Math.round((x/HEX_W-z*0.5/HEX_H)),rr=Math.round(z/HEX_H);
    const col=getBiomeColor(q,rr,h);
    // Fake AO
    const nx_h=c+1<cols?getH(ox+(c+1)*cw,z):h,nz_h=r+1<rows?getH(x,oz+(r+1)*cd):h;
    if((nx_h-h)+(nz_h-h)<-0.05){col[0]=Math.max(0,col[0]-0.08);col[1]=Math.max(0,col[1]-0.04);col[2]=Math.min(1,col[2]+0.10);}
    colors.push(col[0],col[1],col[2]);
  }}
  for(let r=0;r<rows-1;r++)for(let c=0;c<cols-1;c++){const a=r*cols+c,b=r*cols+c+1,d=(r+1)*cols+c,e=(r+1)*cols+c+1;indices.push(a,b,d,b,e,d);}
  const geo=new THREE.BufferGeometry();
  geo.setAttribute('position',new THREE.Float32BufferAttribute(verts,3));
  geo.setAttribute('color',new THREE.Float32BufferAttribute(colors,3));
  geo.setIndex(indices);geo.computeVertexNormals();
  const mat=new THREE.MeshStandardMaterial({vertexColors:true,roughness:0.85,metalness:0,flatShading:true,side:THREE.DoubleSide});
  const mesh=new THREE.Mesh(geo,mat);mesh.receiveShadow=true;mesh.position.y=-0.1;scene.add(mesh);
  return {mesh,getHeight:getH};
}

// ── UTILITIES ────────────────────────────────────
function axialToWorld(q,r){return new THREE.Vector3(HEX_W*(q+r*0.5),0,HEX_H*r);}
const logEl=document.getElementById('log'),logBuf=[];
function L(t,c=''){logBuf.push(c?`<span class="${c}">${t}</span>`:t);logEl.innerHTML=logBuf.join('<br>');logEl.scrollTop=logEl.scrollHeight;}
function SEP(){L('━'.repeat(28),'sep');}
const loader=new GLTFLoader(),gltfCache=new Map();
function loadGLTF(p){if(gltfCache.has(p))return gltfCache.get(p);const prom=new Promise((res,rej)=>loader.load(p,res,void 0,e=>rej(new Error(e.message||'load error'))));gltfCache.set(p,prom);return prom;}
async function measurePair(g,b){try{const[a1,a2]=await Promise.all([fetch(g),fetch(b)]);const[b1,b2]=await Promise.all([a1.arrayBuffer(),a2.arrayBuffer()]);return b1.byteLength+b2.byteLength;}catch(_){return 0;}}

function buildInstancedLayer(gltf,positions,key){
  const ms=[];gltf.scene.traverse(c=>{if(c.isMesh)ms.push(c);});if(!ms.length)return null;
  const g=new THREE.Group(),d=new THREE.Object3D();
  ms.forEach(src=>{
    const inst=new THREE.InstancedMesh(src.geometry,src.material,positions.length);
    inst.userData.assetKey=key;inst.castShadow=true;inst.receiveShadow=true;
    positions.forEach((p,i)=>{d.position.copy(p);d.rotation.set(randTilt(),randRotY(),randTilt());const s=randScale();d.scale.set(s,s*(1+R()*0.15),s);d.updateMatrix();inst.setMatrixAt(i,d.matrix);});
    inst.instanceMatrix.needsUpdate=true;g.add(inst);
  });return g;
}

function placeGLTF(gltf,pos,key,opts={}){
  const o=gltf.scene.clone(true);
  o.position.set(pos.x,pos.y+(opts.sink||0),pos.z);
  const s=opts.scale||randScale();
  o.scale.set(s*(opts.sx||1),s*(opts.sy||1),s*(opts.sz||1));
  o.rotation.set(opts.tiltX||randTilt(),opts.rotY||randRotY(),opts.tiltZ||randTilt());
  o.traverse(n=>{n.userData.assetKey=key;if(n.isMesh){n.castShadow=true;n.receiveShadow=true;}});
  return o;
}

// ── LABELS ────────────────────────────────────────
function roundRect(cx,x,y,w,h,r){
  cx.beginPath();cx.moveTo(x+r,y);cx.lineTo(x+w-r,y);
  cx.quadraticCurveTo(x+w,y,x+w,y+r);cx.lineTo(x+w,y+h-r);
  cx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);cx.lineTo(x+r,y+h);
  cx.quadraticCurveTo(x,y+h,x,y+h-r);cx.lineTo(x,y+r);
  cx.quadraticCurveTo(x,y,x+r,y);cx.closePath();
}
function makeLabel(text,isDeity){
  const c=document.createElement('canvas');c.width=512;c.height=64;const cx=c.getContext('2d');
  cx.clearRect(0,0,512,64);roundRect(cx,8,8,496,48,6);cx.fillStyle='rgba(8,6,14,0.65)';cx.fill();
  cx.font=isDeity?'bold 22px Georgia':'18px Georgia';cx.textAlign='center';cx.textBaseline='middle';
  cx.fillStyle=isDeity?'#ecd8a8':'#b8a888';cx.fillText(text,256,32);
  const tex=new THREE.CanvasTexture(c);tex.minFilter=THREE.LinearFilter;
  const sp=new THREE.Sprite(new THREE.SpriteMaterial({map:tex,transparent:true,depthWrite:false}));
  sp.scale.set(2.2,0.28,1);return sp;
}
function makeSmallLabel(text,color){
  const c=document.createElement('canvas');c.width=256;c.height=48;const cx=c.getContext('2d');
  cx.clearRect(0,0,256,48);roundRect(cx,4,4,248,40,5);cx.fillStyle='rgba(8,6,14,0.55)';cx.fill();
  cx.font='15px Georgia';cx.textAlign='center';cx.textBaseline='middle';
  cx.fillStyle=color||'#b8a888';cx.fillText(text,128,24);
  const tex=new THREE.CanvasTexture(c);tex.minFilter=THREE.LinearFilter;
  const sp=new THREE.Sprite(new THREE.SpriteMaterial({map:tex,transparent:true,depthWrite:false}));
  sp.scale.set(1.1,0.2,1);return sp;
}

// ── MAIN ──────────────────────────────────────────
async function buildWorld(){
  const t0=performance.now();let totalBytes=0,totalDC=0;
  L('κ Tejiendo el mundo armónico…','dim');SEP();

  // 1. Terrain
  L('⌗ Terreno 45° con biomas cromáticos…','dim');
  const {getHeight}=buildTerrain();
  L('✔ Terreno listo — 7 biomas con paletas triádicas','ok');

  // 2. Load ALL GLTFs
  const allKeys=Object.keys(ASSETS);
  L(`⌂ Cargando ${allKeys.length} GLTFs…`,'dim');
  const loads=await Promise.allSettled(allKeys.map(async key=>{
    const a=ASSETS[key];const[bytes,gltf]=await Promise.all([measurePair(a.f,a.b),loadGLTF(a.f)]);
    return {key,bytes,gltf};
  }));
  SEP();const cache=new Map();
  loads.forEach(r=>{if(r.status==='rejected'){L(`✗ ${r.reason.message}`,'err');return;}cache.set(r.value.key,r.value.gltf);totalBytes+=r.value.bytes;L(`✔ ${r.value.key}`,'ok');});

  // 3. L0 Tiles on terrain
  SEP();L('ϟ Colocando tiles L0 sobre terreno…','dim');
  const tileGroups={};
  CELLS.forEach(c=>{
    const s=TILE_MAP[Object.keys(BIOMES).find(k=>BIOMES[k].c.q===c.q&&BIOMES[k].c.r===c.r)?c.biome==='ogigia'?'water':'grass':'grass'];
    if(!tileGroups[s])tileGroups[s]=[];
    const p=axialToWorld(c.q,c.r);p.y=getHeight(p.x,p.z);tileGroups[s].push(p);
  });
  Object.entries(tileGroups).forEach(([stem,poses])=>{
    const gltf=cache.get(stem);if(!gltf){L(`✗ No hay GLTF para ${stem}`,'warn');return;}
    const grp=buildInstancedLayer(gltf,poses,stem);if(grp){scene.add(grp);totalDC+=grp.children.length;L(`✔ L0 ${stem}: ${poses.length} instancias`,'dim');}
  });

  // 4. L2 Alpha Anchors + L1 Environment (ALL REAL GLTFs)
  SEP();L('ϟ Colocando anchors y GLTFs de ambiente…','dim');

  // First pass: place occupants (L2)
  CELLS.forEach(cell=>{
    if(!cell.occ)return;
    const basePos=axialToWorld(cell.q,cell.r);basePos.y=getHeight(basePos.x,basePos.z);
    const gltf=cache.get(cell.occ);
    if(gltf){
      const isAlpha=cell.occ==='building_castle_green'||cell.occ==='building_bridge_B'||cell.occ==='building_destroyed';
      const sink=randSink()*0.7;
      const scale=isAlpha?0.9+R()*0.2:0.5+R()*0.3;
      const obj=placeGLTF(gltf,basePos,cell.occ,{sink,scale});
      scene.add(obj);totalDC+=1;L(`✔ Alpha ${cell.occ} en (${cell.q},${cell.r})`,'ok');
    }
  });

  // Second pass: environment (L1) — ALL REAL GLTFs, 70/30 clustering
  SEP();L('ϟ Ambiente con regla 70/30 — solo GLTFs reales…','dim');
  CELLS.forEach(cell=>{
    if(!cell.env||!cell.env.length)return;
    const base=axialToWorld(cell.q,cell.r);base.y=getHeight(base.x,base.z);
    const isDense=cell.occ!==null||cell.env.length>2;
    const envCount=isDense?cell.env.length:Math.max(1,Math.floor(cell.env.length*0.3));
    for(let i=0;i<envCount;i++){
      const aid=cell.env[i%cell.env.length];
      const gltf=cache.get(aid);
      if(!gltf)continue;
      const jitter=isDense?0.1:0.25;
      const pos=base.clone().add(new THREE.Vector3((R()-0.5)*jitter,0,(R()-0.5)*jitter));
      pos.y=getHeight(pos.x,pos.z);
      const sink=aid==='coin_stack_large'?randSink()*0.3:randSink()*0.6;
      const scale=aid==='cloud_big'?0.3+R()*0.3:aid==='coin_stack_large'?0.2+R()*0.2:0.4+R()*0.3;
      const obj=placeGLTF(gltf,pos,aid,{sink,scale});
      scene.add(obj);totalDC+=1;
    }
  });
  L(`✔ Ambiente GLTF colocado — ${totalDC-totalDC*0.3} clusters densos + espacio negativo`,'ok');

  // 5. Sacred peak for Olimpo
  const cumbre=CELLS.find(c=>c.q===-1&&c.r===1);
  if(cumbre){
    const pos=axialToWorld(cumbre.q,cumbre.r);pos.y=getHeight(pos.x,pos.z);
    const mtn=cache.get('mountain_B_grass_trees');
    if(mtn){const o=placeGLTF(mtn,pos,'cumbre',{scale:0.9,rotY:randRotY()});scene.add(o);totalDC+=1;L('✔ Pico sagrado del Olimpo','ok');}
  }

  // 6. Labels
  SEP();L('ϟ Etiquetas…','dim');
  [{q:0,r:0,t:'Olimpo',d:true},{q:8,r:0,t:'Itaca'},{q:-5,r:5,t:'Ogigia'},{q:12,r:-4,t:'Troya'},{q:5,r:3,t:'Pilos'},{q:7,r:5,t:'Esparta'}].forEach(lc=>{
    const p=axialToWorld(lc.q,lc.r);p.y=getHeight(p.x,p.z)+0.6;const sp=makeLabel(lc.t,lc.d);sp.position.copy(p);scene.add(sp);
  });
  [{q:0,r:0,t:'Júpiter',c:'#ecd8a8'},{q:0,r:1,t:'Minerva',c:'#7ab0e0'},{q:1,r:0,t:'Mercurio',c:'#f0c060'},
   {q:9,r:0,t:'Telémaco'},{q:9,r:-1,t:'Penélope'},{q:7,r:0,t:'Antinoo',c:'#e07050'},{q:8,r:-1,t:'Femio'},
   {q:-5,r:6,t:'Calipso',c:'#e8a0bf'},{q:-4,r:5,t:'Ulises',c:'#ecd8a8'},{q:7,r:5,t:'Menelao'},{q:5,r:3,t:'Néstor'}].forEach(cl=>{
    const p=axialToWorld(cl.q,cl.r);p.y=getHeight(p.x,p.z)+0.45;const sp=makeSmallLabel(cl.t,cl.c);sp.position.copy(p);scene.add(sp);
  });

  // 7. Report
  SEP();
  L(`Χ ${((performance.now()-t0)/1000).toFixed(1)}s · ${(totalBytes/1024).toFixed(0)} KB`,'ok');
  L(`Χ ~${totalDC} draw calls · 12 GLTFs únicos · 0 geometría procedural`,'ok');
  L(`Χ Sol a 40° · Sombras 2048 · Niebla #4a5a6a · Transformaciones estocásticas`,'dim');
  SEP();L('✔ Mundo armónico completado. Solo GLTFs reales.','ok');
  setTimeout(()=>{
    console.group('%c🏛️ Odisea Canto I — Armónico','color:#ecd8a8;font-weight:bold');
    console.log('Celdas:',CELLS.length,'Draw calls:',renderer.info.render.calls);
    console.log('Geometrías:',renderer.info.memory.geometries,'Texturas:',renderer.info.memory.textures);
    console.groupEnd();
  },1500);
}

// ── RENDER LOOP ──────────────────────────────────
const fpsEl=document.getElementById('fps');
let lastT=performance.now(),frames=0;
renderer.setAnimationLoop(()=>{
  controls.update();renderer.render(scene,camera);frames++;
  const n=performance.now();
  if(n-lastT>=1000){fpsEl.textContent=`${frames} fps`;fpsEl.style.color=frames>=50?'#7aaf6a':frames>=25?'#c9a84c':'#c95a4c';frames=0;lastT=n;}
});
buildWorld().catch(err=>{SEP();L(`☠ ${err.message}`,'err');console.error(err);});
</script>
</body>
</html>
