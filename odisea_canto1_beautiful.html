  }
  return null;
}

// ═══════════════════════════════════════════════════════════
// 4. PROCEDURAL TERRAIN — 45° SLOPES WITH VERTEX COLORS
// ═══════════════════════════════════════════════════════════

function buildTerrain() {
  const gridW = 28, gridD = 20;
  const cellW = 1.6, cellD = 1.6;
  const verts = [], colors = [], indices = [];
  const cols = gridW, rows = gridD;
  const offX = -gridW * cellW / 2, offZ = -gridD * cellD / 2 + 4;

  // Height function: 45° slopes around biomes
  function getHeight(x, z) {
    const q = (x / HEX_W - z * 0.5 / HEX_H);
    const r = z / HEX_H;
    let h = 0;
    // Biome terrain bumps
    for(const [name, b] of Object.entries(BIOMES)) {
      const bqx = b.center.q; const brz = b.center.r;
      const bwx = HEX_W * (bqx + brz * 0.5);
      const bwz = HEX_H * brz;
      const dx = x - bwx, dz = z - bwz;
      const dist = Math.sqrt(dx*dx + dz*dz);
      const rad = b.radius * HEX_W * 1.1;
      if(dist < rad) {
        // 45° slope: height = dist * sin(45) for the slopes, peak at center
        const t = 1 - dist / rad;
        h += t * t * 0.6; // parabolic peak
        // 45° slope ring: sharp angular falloff
        if(dist > rad * 0.6 && dist < rad) {
          const slope = (dist - rad * 0.6) / (rad * 0.4);
          h += slope * 0.15 * (1 - t);
        }
      }
    }
    // Add micro-45° noise for angular terrain character
    const nx = Math.sin(x * 0.3) * Math.cos(z * 0.4) * 0.04;
    const nz = Math.cos(x * 0.5) * Math.sin(z * 0.35) * 0.04;
    h += Math.abs(nx + nz) * 0.3; // absolute = sharper ridges
    return Math.max(0, h);
  }

  for(let r = 0; r < rows; r++) {
    for(let c = 0; c < cols; c++) {
      const x = offX + c * cellW;
      const z = offZ + r * cellD;
      const h = getHeight(x, z);
      verts.push(x, h, z);

      // VERTEX COLOR LAYERING (skill §3.1)
      const biome = getHeight > 0.4 ? getBiome(
        Math.round((x / HEX_W - z * 0.5 / HEX_H)),
        Math.round(z / HEX_H)
      ) : null;

      const hNorm = Math.min(1, h / 0.8);
      let col;
      if(biome) {
        // Interpolate low→mid→high based on height
        if(hNorm < 0.3) {
          const t = hNorm / 0.3;
          col = [
            biome.lowColor[0] + (biome.midColor[0] - biome.lowColor[0]) * t,
            biome.lowColor[1] + (biome.midColor[1] - biome.lowColor[1]) * t,
            biome.lowColor[2] + (biome.midColor[2] - biome.lowColor[2]) * t,
          ];
        } else {
          const t = (hNorm - 0.3) / 0.7;
          col = [
            biome.midColor[0] + (biome.highColor[0] - biome.midColor[0]) * t,
            biome.midColor[1] + (biome.highColor[1] - biome.midColor[1]) * t,
            biome.midColor[2] + (biome.highColor[2] - biome.midColor[2]) * t,
          ];
        }
      } else {
        col = DEFAULT_LOW.map((v,i) => v + (DEFAULT_MID[i] - v) * Math.min(1, hNorm * 2));
      }

      // FAKE AO (skill §3.1): tint downward slopes with desaturated violet
      // Detected by comparing to neighbor heights
      const nx_h = c+1 < cols ? getHeight(offX + (c+1)*cellW, z) : h;
      const nz_h = r+1 < rows ? getHeight(x, offZ + (r+1)*cellD) : h;
      const slope = (nx_h - h) + (nz_h - h);
      if(slope < -0.05) {
        col[0] = Math.max(0, col[0] - 0.08);
        col[1] = Math.max(0, col[1] - 0.04);
        col[2] = Math.min(1, col[2] + 0.10); // blue-violet tint
      }

      colors.push(col[0], col[1], col[2]);
    }
  }

  // Grid indices (2 triangles per quad)
  for(let r = 0; r < rows - 1; r++) {
    for(let c = 0; c < cols - 1; c++) {
      const a = r * cols + c;
      const b = r * cols + c + 1;
      const d = (r + 1) * cols + c;
      const e = (r + 1) * cols + c + 1;
      indices.push(a, b, d, b, e, d);
    }
  }

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute(verts, 3));
  geo.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
  geo.setIndex(indices);
  geo.computeVertexNormals();

  const mat = new THREE.MeshStandardMaterial({
    vertexColors: true,
    roughness: 0.85,
    metalness: 0.0,
    flatShading: true,
    side: THREE.DoubleSide
  });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.receiveShadow = true;
  mesh.position.y = -0.1;
  scene.add(mesh);
  return { mesh, getHeight };
}

function axialToWorld(q, r) { return new THREE.Vector3(HEX_W*(q+r*0.5), 0, HEX_H*r); }
const logEl = document.getElementById('log');
const logBuf = [];
function L(t, c='') { logBuf.push(c ? `<span class="${c}">${t}</span>` : t); logEl.innerHTML = logBuf.join('<br>'); logEl.scrollTop=logEl.scrollHeight; }
function SEP() { L('━'.repeat(28),'sep'); }

const loader = new GLTFLoader();
const gltfCache = new Map();
function loadGLTF(p) {
  if(gltfCache.has(p)) return gltfCache.get(p);
  const prom = new Promise((res,rej)=>loader.load(p,res,void 0,e=>rej(new Error(e.message||'load error'))));
  gltfCache.set(p,prom); return prom;
}
async function measurePair(g,b) {
  try { const [a1,a2]=await Promise.all([fetch(g),fetch(b)]); const [b1,b2]=await Promise.all([a1.arrayBuffer(),a2.arrayBuffer()]); return b1.byteLength+b2.byteLength; } catch(_){return 0;}
}

function buildInstancedLayer(gltf, positions, key) {
  const ms = []; gltf.scene.traverse(c=>{if(c.isMesh)ms.push(c);});
  if(!ms.length) return null;
  const g = new THREE.Group(), d = new THREE.Object3D();
  ms.forEach(src=>{
    const inst = new THREE.InstancedMesh(src.geometry, src.material, positions.length);
    inst.userData.assetKey=key; inst.castShadow=true; inst.receiveShadow=true;
    positions.forEach((p,i)=>{
      d.position.copy(p);
      // Stochastic rotation (skill §4.1)
      d.rotation.set(randTilt(), randRotY(), randTilt());
      // Non-uniform scaling (skill §4.2)
      const s = randScale();
      d.scale.set(s, s * (1.0 + R() * 0.15), s);
      d.updateMatrix();
      inst.setMatrixAt(i,d.matrix);
    });
    inst.instanceMatrix.needsUpdate = true;
    g.add(inst);
  });
  return g;
}

function placeUnique(gltf, pos, key, opts={}) {
  const o = gltf.scene.clone(true);
  o.position.set(pos.x, pos.y + (opts.sink||0), pos.z);
  // Stochastic transforms
  const s = opts.scale || randScale();
  o.scale.set(s * (opts.sx||1), s * (opts.sy||1), s * (opts.sz||1));
  o.rotation.set(opts.tiltX||randTilt(), opts.rotY||randRotY(), opts.tiltZ||randTilt());
  o.traverse(n=>{ n.userData.assetKey=key; if(n.isMesh){n.castShadow=true;n.receiveShadow=true;} });
  return o;
}

// ── ENVIRONMENT FALLBACK ────────────────────────
function createFallback(aid, pos, getHeightFn) {
  const g = new THREE.Group();
  g.position.copy(pos);
  g.userData.assetKey = aid;
  // Ground sink: 10-25% below surface
  const sinkY = groundSink();
  g.position.y += sinkY;
  g.rotation.set(randTilt(), randRotY(), randTilt());

  const B = (w,h,d,c,r=0.8) => {const mm=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),new THREE.MeshStandardMaterial({color:c,roughness:r,flatShading:true}));mm.castShadow=true;return mm;};
  const CYL = (rt,rb,h,c) => {const mm=new THREE.Mesh(new THREE.CylinderGeometry(rt,rb,h,6),new THREE.MeshStandardMaterial({color:c,roughness:0.9,flatShading:true}));mm.castShadow=true;return mm;};
  // Apply non-uniform scaling to environment as well
  const ss = randScale();

  switch(aid) {
    case 'banner_blue': case 'banner_red': case 'banner_green':
    case 'banner_yellow': case 'banner_white': case 'banner_brown':
      const cm = {banner_blue:0x4a7db5,banner_red:0xb84a3a,banner_green:0x3a8a5a,banner_yellow:0xc8a85a,banner_white:0xc8c0b0,banner_brown:0x8a6e4b};
      const m=B(0.06*ss,0.35*ss,0.20*ss,cm[aid]||0x8a6e4b); m.position.y=0.2*ss; g.add(m);
      g.add(CYL(0.015*ss,0.02*ss,0.4*ss,0x5a4030).translateY(0.2*ss));
      break;
    case 'banner_patternB_red': case 'banner_patternC_red': case 'banner_patternA_red':
      g.add(B(0.06*ss,0.40*ss,0.22*ss,0xb84a3a,0.7).translateY(0.22*ss));
      break;
    case 'barrier': case 'barrier_half':
      g.add(B((aid==='barrier'?0.08:0.04)*ss,0.20*ss,0.25*ss,0x5a4030).translateY(0.12*ss));
      break;
    case 'torch': case 'torch_lit':
      g.add(CYL(0.015*ss,0.02*ss,0.35*ss,0x5a4030).translateY(0.2*ss));
      if(aid==='torch_lit') {
        const fl=new THREE.Mesh(new THREE.SphereGeometry(0.04*ss,4,4),new THREE.MeshStandardMaterial({color:0xff8800,emissive:0xff4400,emissiveIntensity:0.5}));
        fl.position.y=0.4*ss; g.add(fl);
        const gl=new THREE.PointLight(0xff6600,0.25,1.5); gl.position.y=0.4*ss; g.add(gl);
      }
      break;
    case 'candle': case 'candle_thin':
      g.add(CYL(0.015*ss,0.02*ss,0.08*ss,0xf5e6c8).translateY(0.04*ss));
      break;
    case 'barrel_small': case 'barrel_large':
      const rr=aid==='barrel_large'?0.08:0.05;
      g.add(CYL(rr*ss,rr*1.1*ss,0.14*ss,0x6b4c3b).translateY(0.07*ss));
      break;
    case 'box_small': case 'box_large':
      const s=aid==='box_large'?0.08:0.05;
      g.add(B(s*ss,s*ss,s*ss,0x7a5a3a).translateY(s*ss/2));
      break;
    case 'pillar': case 'pillar_op':
      g.add(CYL(0.06*ss,0.07*ss,0.3*ss,0x7a7a6a).translateY(0.15*ss));
      break;
    case 'ruins':
      g.add(B(0.20*ss,0.08*ss,0.20*ss,0x5a5040).translateY(0.04*ss));
      const rb=new THREE.Mesh(new THREE.DodecahedronGeometry(0.04*ss),new THREE.MeshStandardMaterial({color:0x4a4030,roughness:0.9,flatShading:true}));
      rb.position.set(0.06*ss,0.02*ss,0.05*ss); g.add(rb);
      break;
    default:
      g.add(B(0.04*ss,0.04*ss,0.04*ss,0x8a7e65).translateY(0.02*ss));
  }
  return g;
}

// ── CANVAS LABELS ────────────────────────────────
function roundRect(cx,x,y,w,h,r) {
  cx.beginPath(); cx.moveTo(x+r,y); cx.lineTo(x+w-r,y);
  cx.quadraticCurveTo(x+w,y,x+w,y+r); cx.lineTo(x+w,y+h-r);
  cx.quadraticCurveTo(x+w,y+h,x+w-r,y+h); cx.lineTo(x+r,y+h);
  cx.quadraticCurveTo(x,y+h,x,y+h-r); cx.lineTo(x,y+r);
  cx.quadraticCurveTo(x,y,x+r,y); cx.closePath();
}
function makeLabel(text,isDeity) {
  const c=document.createElement('canvas');c.width=512;c.height=64;
  const cx=c.getContext('2d'); cx.clearRect(0,0,512,64);
  roundRect(cx,8,8,496,48,6); cx.fillStyle='rgba(8,6,14,0.65)';cx.fill();
  cx.font=isDeity?'bold 22px Georgia':'18px Georgia';cx.textAlign='center';cx.textBaseline='middle';
  cx.fillStyle=isDeity?'#ecd8a8':'#b8a888';cx.fillText(text,256,32);
  const tex=new THREE.CanvasTexture(c);tex.minFilter=THREE.LinearFilter;
  const sp=new THREE.Sprite(new THREE.SpriteMaterial({map:tex,transparent:true,depthWrite:false}));
  sp.scale.set(2.2,0.28,1);return sp;
}
function makeSmallLabel(text,color) {
  const c=document.createElement('canvas');c.width=256;c.height=48;
  const cx=c.getContext('2d'); cx.clearRect(0,0,256,48);
  roundRect(cx,4,4,248,40,5); cx.fillStyle='rgba(8,6,14,0.55)';cx.fill();
  cx.font='15px Georgia';cx.textAlign='center';cx.textBaseline='middle';
  cx.fillStyle=color||'#b8a888';cx.fillText(text,128,24);
  const tex=new THREE.CanvasTexture(c);tex.minFilter=THREE.LinearFilter;
  const sp=new THREE.Sprite(new THREE.SpriteMaterial({map:tex,transparent:true,depthWrite:false}));
  sp.scale.set(1.1,0.2,1);return sp;
}

// ═══════════════════════════════════════════════════════════
// 7. WORLD BUILDER
// ═══════════════════════════════════════════════════════════

async function buildWorld() {
  const t0 = performance.now();
  let totalBytes=0, totalDC=0;

  L('κ Tejiendo el mundo…','dim'); SEP();

  // Step 1: Build procedural terrain
  L('⌗ Generando terreno angular…','dim');
  const { getHeight } = buildTerrain();
  L('✔ Terreno 45° con color por vértice','ok');

  // Step 2: Load tile GLTFs
  const tileTypes = [...new Set(CELLS.map(c=>tileMap[c.tileType]))];
  L(`⌂ Tipos de tile: ${tileTypes.join(', ')}`,'dim');
  const tileLoads = await Promise.allSettled(tileTypes.map(async stem=>{
    const e = tileReg[stem]; if(!e) throw Error(`No '${stem}'`);
    const [bytes,gltf] = await Promise.all([measurePair(e.f,e.b),loadGLTF(e.f)]);
    return {stem,bytes,gltf};
  }));
  SEP();
  const tileCache=new Map();
  tileLoads.forEach((r,i)=>{
    if(r.status==='rejected'){L(`✗ ${tileTypes[i]}: ${r.reason.message}`,'err');return;}
    tileCache.set(r.value.stem,r.value.gltf); totalBytes+=r.value.bytes; L(`✔ ${r.value.stem}`,'ok');
  });

  // Step 3: L0 tiles as InstancedMesh on terrain surface
  SEP(); L('ϟ Capa L0 — tiles sobre terreno…','dim');
  const tileGroups = {};
  CELLS.forEach(c=>{
    const s=tileMap[c.tileType]; if(!tileGroups[s])tileGroups[s]=[];
    const pos=axialToWorld(c.q,c.r);
    pos.y = getHeight(pos.x, pos.z); // Follow terrain
    tileGroups[s].push(pos);
  });
  Object.entries(tileGroups).forEach(([stem,poses])=>{
    const gltf=tileCache.get(stem); if(!gltf){L(`✗ No hay GLTF para ${stem}`,'warn');return;}
    const grp=buildInstancedLayer(gltf,poses,stem);
    if(grp){scene.add(grp);totalDC+=grp.children.length;L(`✔ L0 ${stem}: ${poses.length} instancias con rotación estocástica`,'dim');}
  });

  // Step 4: Load occupant GLTFs
  SEP(); L('ϟ Cargando ocupantes (L2)…','dim');
  const needed=[...new Set(CELLS.filter(c=>c.occupant&&occMap[c.occupant]).map(c=>occMap[c.occupant]))];
  needed.push('mountain_B_grass_trees');
  const occLoads = await Promise.allSettled(needed.map(async key=>{
    const e=occReg[key]; if(!e)throw Error(`No '${key}'`);
    const [bytes,gltf]=await Promise.all([measurePair(e.f,e.b),loadGLTF(e.f)]);
    return {key,bytes,gltf};
  }));
  const occCache=new Map();
  occLoads.forEach(r=>{
    if(r.status==='rejected'){L(`✗ ${r.reason.message}`,'err');return;}
    occCache.set(r.value.key,r.value.gltf); totalBytes+=r.value.bytes; L(`✔ ${r.value.key}`,'ok');
  });

  // Step 5: Place L2 occupants with ground sink + stochastic transforms
  SEP(); L('ϟ Colocando ocupantes con peso y rotación…','dim');
  CELLS.forEach(cell=>{
    if(!cell.occupant) return;
    const basePos=axialToWorld(cell.q,cell.r);
    basePos.y = getHeight(basePos.x, basePos.z);
    const ak=occMap[cell.occupant];
    if(ak) {
      const gltf=occCache.get(ak);
      if(gltf) {
        // 70/30 rule: scale important buildings larger, sink 15% into terrain
        const isMajor = cell.occupant==='palacio_ulises';
        const sink = groundSink() * 0.7;
        const obj = placeUnique(gltf, basePos, ak, { sink, scale: isMajor ? 1.0 : 0.7 + R()*0.3 });
        scene.add(obj); totalDC+=1; L(`✔ ${cell.occupant} — hundido ${Math.abs(sink*100).toFixed(0)}%`,'ok');
      }
    }
    // Deities on terrain
    if(cell.occupant==='jupiter'||cell.occupant==='minerva'||cell.occupant==='mercurio'){
      const th=occCache.get('coin_stack_large');
      if(th){const pos2=basePos.clone().add(new THREE.Vector3(0,0,0.08));pos2.y=getHeight(pos2.x,pos2.z);const o=placeUnique(th,pos2,cell.occupant,{sink:groundSink()*0.5,scale:0.4,rotY:randRotY()});scene.add(o);totalDC+=1;}
      if(cell.occupant==='jupiter'){const cl=occCache.get('mountain_B_grass_trees');if(cl){const pos2=basePos.clone().add(new THREE.Vector3(0,0.5,0));const o=placeUnique(cl,pos2,'cloud',{scale:0.3,rotY:randRotY()});scene.add(o);totalDC+=1;}}
    }
    if(cell.occupant==='ulises'){const hu=occCache.get('building_dirt');if(hu){const o=placeUnique(hu,basePos,'hut',{scale:0.5,sink:groundSink()*0.6,rotY:randRotY()});scene.add(o);totalDC+=1;}}
  });
  // Mountain at Olimpo cumbre
  const cumbre=CELLS.find(c=>c.q===-1&&c.r===1);
  if(cumbre){const pos=axialToWorld(cumbre.q,cumbre.r);pos.y=getHeight(pos.x,pos.z);const mtn=occCache.get('mountain_B_grass_trees');if(mtn){const o=placeUnique(mtn,pos,'cumbre',{scale:0.8,rotY:randRotY()});scene.add(o);totalDC+=1;L('✔ Cumbre del Olimpo','ok');}}

  // Step 6: L1 environment with 70/30 clustering
  SEP(); L('ϟ Capa L1 — ambiente con regla 70/30…','dim');
  CELLS.forEach(cell=>{
    if(!cell.env||!cell.env.length) return;
    const base=axialToWorld(cell.q,cell.r);
    base.y = getHeight(base.x, base.z);

    // 70/30 rule: cluster density around important cells
    const isDense = cell.occupant !== null || cell.env.length > 2;
    const envCount = isDense ? cell.env.length : Math.max(1, Math.floor(cell.env.length * 0.3));

    for(let i=0; i<envCount; i++) {
      const aid = cell.env[i % cell.env.length];
      // Scatter with jitter (70/30: dense cluster within 30% of cell area)
      const jitter = isDense ? 0.08 : 0.20;
      const pos = base.clone().add(new THREE.Vector3(
        (R()-0.5) * jitter,
        0,
        (R()-0.5) * jitter
      ));
      pos.y = getHeight(pos.x, pos.z);
      scene.add(createFallback(aid, pos, getHeight));
      totalDC += 1;
    }
  });
  L(`✔ Ambiente disperso con clusters densos`,'ok');

  // Step 7: Labels
  SEP(); L('ϟ Añadiendo etiquetas…','dim');
  [{q:0,r:0,t:'Olimpo',d:true},{q:8,r:0,t:'Itaca'},{q:-5,r:5,t:'Ogigia'},{q:12,r:-4,t:'Troya'},{q:5,r:3,t:'Pilos'},{q:7,r:5,t:'Esparta'}].forEach(lc=>{
    const p=axialToWorld(lc.q,lc.r);p.y=getHeight(p.x,p.z)+0.6;
    const sp=makeLabel(lc.t,lc.d);sp.position.copy(p);scene.add(sp);
  });
  [{q:0,r:0,t:'Júpiter',c:'#ecd8a8'},{q:0,r:1,t:'Minerva',c:'#7ab0e0'},{q:1,r:0,t:'Mercurio',c:'#f0c060'},
   {q:9,r:0,t:'Telémaco'},{q:9,r:-1,t:'Penélope'},{q:7,r:0,t:'Antinoo',c:'#e07050'},{q:8,r:-1,t:'Femio'},
   {q:-5,r:6,t:'Calipso',c:'#e8a0bf'},{q:-4,r:5,t:'Ulises',c:'#ecd8a8'},{q:7,r:5,t:'Menelao'},{q:5,r:3,t:'Néstor'}].forEach(cl=>{
    const p=axialToWorld(cl.q,cl.r);p.y=getHeight(p.x,p.z)+0.45;
    const sp=makeSmallLabel(cl.t,cl.c);sp.position.copy(p);scene.add(sp);
  });

  // Step 8: Report
  SEP();
  L(`Χ ${((performance.now()-t0)/1000).toFixed(1)}s · ${(totalBytes/1024).toFixed(0)} KB`,'ok');
  L(`Χ ~${totalDC} draw calls · ${CELLS.length} celdas · Paletas triádicas por bioma`,'dim');
  L(`Χ Sol a 40° · Sombras duras · Niebla exponencial · Vértices coloreados`,'dim');
  SEP(); L('✔ Hermoso mundo completado. La Odisea brilla.','ok');
  setTimeout(()=>{
    console.group('%c🌅 Odisea Canto I — Hermoso Mundo','color:#ecd8a8;font-weight:bold');
    console.log('Celdas:',CELLS.length,'Draw calls:',renderer.info.render.calls);
    console.log('Triángulos:',renderer.info.render.triangles);
    console.log('Geometrías:',renderer.info.memory.geometries);
    console.groupEnd();
  },1500);
}

// ═══════════════════════════════════════════════════════════
// 8. RENDER LOOP
// ═══════════════════════════════════════════════════════════

const fpsEl = document.getElementById('fps');
let lastT=performance.now(),frames=0;
renderer.setAnimationLoop(()=>{
  controls.update(); renderer.render(scene,camera); frames++;
  const n=performance.now();
  if(n-lastT>=1000){fpsEl.textContent=`${frames} fps`;fpsEl.style.color=frames>=50?'#7aaf6a':frames>=25?'#c9a84c':'#c95a4c';frames=0;lastT=n;}
});

buildWorld().catch(err=>{SEP();L(`☠ ${err.message}`,'err');console.error(err);});
</script>
