const HEX_W = 1.82;
const HEX_H = 1.575;

/* Simple seeded-ish PRNG */
function S(seed){return function(){seed|=0;seed=seed+0x6D2B79F5|0;let t=Math.imul(seed^seed>>>15,1|seed);t=t+Math.imul(t^t>>>15,61|t)^t;return((t^t>>>14)>>>0)/4294967296}}
const R=S(4242);
const rY=()=>R()*Math.PI*2;
const rT=()=>(R()-0.5)*0.17;
const rS=()=>0.82+R()*0.36;
const rF=(n,x)=>n+R()*(x-n);

function axialToWorld(q,r){
    return new THREE.Vector3(HEX_W*(q+r*0.5),0,HEX_H*r);
}

    ogigia:{center:{q:-5,r:5},radius:3,tileType:'water', color:0x3a7aba,labelColor:'#3a7aba'},
    troya: {center:{q:12,r:-4},radius:3,tileType:'stone_dark',color:0x8a5a3a,labelColor:'#8a5a3a'},
    pilos: {center:{q:5,r:3},radius:2,tileType:'sand',color:0xb8a070,labelColor:'#b8a070'},
    esparta:{center:{q:7,r:5},radius:2,tileType:'dirt',color:0x7a6a4a,labelColor:'#7a6a4a'},
    tafos: {center:{q:3,r:-2},radius:2,tileType:'sand',color:0x6a9a5a,labelColor:'#6a9a5a'}
};
function getBiome(q,r){
    for(const b of Object.values(BIOMES)){
        if(Math.abs(q-b.center.q)<=b.radius && Math.abs(r-b.center.r)<=b.radius) return b;
    }
    return null;
}
function getTileType(q,r){
    const b=getBiome(q,r);
    if(!b) return 'grass';
    // Map conceptual tileTypes to actual available assets
    const tt=b.tileType;
    if(tt==='water'||tt==='stone'||tt==='stone_dark'||tt==='sand'||tt==='dirt') return 'grass';
    return tt;
}

function buildOkeanosDisc(){
    const S=48; // ring segments
    const rings=[
        {inner:0,outer:6,  color:0x0a1a2e},{inner:6,outer:11, color:0x0f2a4a},

            new THREE.MeshStandardMaterial({color:r.color,flatShading:true,roughness:0.95,metalness:0,side:THREE.DoubleSide})

        m.rotation.x=-Math.PI/2;

    // Outer wall (vertical ring)

    const ow=new THREE.Mesh(new THREE.CylinderGeometry(22.5,22.5,0.08,S,1,true),wallMat);

};

async function loadAllAssets(){
    const keys=Object.keys(ASSETS);
    log('⌂ Loading '+keys.length+' GLTFs…','dim');
    let loaded=0,errors=0,totalBytes=0;
    for(const k of keys){
        try{
            const a=ASSETS[k];
            const [gltfResp,binResp]=await Promise.all([fetch(a.f),fetch(a.b)]);
            const [gltfBuf,binBuf]=await Promise.all([gltfResp.arrayBuffer(),binResp.arrayBuffer()]);
            totalBytes+=gltfBuf.byteLength+binBuf.byteLength;
            const gltf=await new Promise((rs,rj)=>loader.load(a.f,rs,void 0,e=>rj(e)));
            cache.set(k,gltf);
            loaded++;
            log('✔ '+k,'ok');
        }catch(e){
            errors++;
            log('✗ '+k+' → '+e.message,'warn');
        }
    }
    return {loaded,errors,totalBytes};
}

/* ─────────────────────────────────────────────────────
   BUILDING THE WORLD

function buildInstancedTiles(){
    // Group cells by tile asset
    const groups={};
    CELLS.forEach(c=>{
        const tt=getTileType(c.q,c.r);
        const assetKey=TILE_FILES[tt]||'hex_grass';
        if(!groups[assetKey]) groups[assetKey]=[];
        const p=axialToWorld(c.q,c.r);
        p.x+=4; // center on disc
        groups[assetKey].push(p);
    });

    Object.entries(groups).forEach(([key,positions])=>{
        const gltf=cache.get(key);
        if(!gltf){log('✗ Missing GLTF: '+key,'warn');return;}
        
        // Extract geometry and material from first mesh
        let geo=null,mat=null;
        gltf.scene.traverse(n=>{if(n.isMesh&&!geo){geo=n.geometry;mat=n.material;}});
        if(!geo){log('✗ No mesh in '+key,'warn');return;}

        const im=new THREE.InstancedMesh(geo,mat,positions.length);
        im.userData.assetKey=key;
        im.castShadow=true;
        im.receiveShadow=true;

        const dummy=new THREE.Object3D();
        positions.forEach((p,i)=>{
            dummy.position.copy(p);
            dummy.rotation.y=0;
            dummy.updateMatrix();
            im.setMatrixAt(i,dummy.matrix);
        });
        im.instanceMatrix.needsUpdate=true;
        scene.add(im);
        log('✔ L0 '+key+': '+positions.length+' inst','dim');
    });
}

/* validOn check */
const VALID_L1={
    cloud_big:['grass','dirt','mountain'],
    coin_stack_large:['stone','grass','dirt','sand','mountain'],
    building_dirt:['grass','dirt'],
    building_grain:['grass','dirt'],
    hex_road_A:['grass','stone','stone_dark','dirt','sand','mountain']
};
const VALID_L2={
    building_castle_green:['grass','dirt'],
    building_bridge_A:['grass','dirt'],
    building_bridge_B:['grass','dirt'],
    building_dirt:['grass','dirt'],
    building_destroyed:['grass','dirt'],
    building_grain:['grass','dirt'],
    mountain_B_grass_trees:['grass','dirt','mountain']
};

function isValid(cell,assetKey,layer){
    const tt=getTileType(cell.q,cell.r);
    if(layer==='L1'){
        const lu=VALID_L1[assetKey]||['grass','dirt'];
        if(!lu.includes(tt)) return false;
        if(cell.occ) return false; // L2 conflict
        return true;
    }
    if(layer==='L2'){
        const lu=VALID_L2[assetKey]||['grass','dirt'];
        return lu.includes(tt);
    }
    return true;
}

function placeOccupant(cell,assetKey){
    const gltf=cache.get(assetKey);
    if(!gltf) return false;
    const p=axialToWorld(cell.q,cell.r);
    p.x+=4;
    const obj=gltf.scene.clone(true);
    obj.position.set(p.x,0.01,p.z);
    const isAnchor=['building_castle_green','building_bridge_B','building_destroyed','mountain_B_grass_trees'].includes(assetKey);
    const sc=isAnchor?0.85+R()*0.25:0.5+R()*0.3;
    obj.scale.set(sc,sc,sc);
    obj.rotation.y=rY();
    obj.traverse(n=>{
        n.userData.assetKey=assetKey;
        if(n.isMesh){n.castShadow=true;n.receiveShadow=true;}
    });
    scene.add(obj);
    return true;
}

function placeEnvironment(cell){
    if(!cell.env||!cell.env.length) return;
    const p=axialToWorld(cell.q,cell.r);
    p.x+=4;

    // Determine count: if occupant exists OR many env items, limit
    const isDense=cell.occ!==null||cell.env.length>2;
    const count=isDense?cell.env.length:Math.min(cell.env.length,Math.ceil(cell.env.length*0.3));

    for(let i=0;i<count;i++){
        const assetKey=cell.env[i%cell.env.length];
        if(!isValid(cell,assetKey,'L1')) continue;
        const gltf=cache.get(assetKey);
        if(!gltf) continue;

        const isCloud=assetKey==='cloud_big';
        const jitter=isCloud?0.3:(isDense?0.1:0.25);
        const bp=p.clone().add(new THREE.Vector3((R()-0.5)*jitter,0,(R()-0.5)*jitter));

        if(isCloud){
            // Determine float height by biome
            const biome=getBiome(cell.q,cell.r);
            let fm=1.5,fx=2.5,sm=0.3,sx=0.5;
            if(biome){
                const name=Object.keys(BIOMES).find(k=>BIOMES[k]===biome);
                if(name==='olimpo'){fm=3;fx=4;sm=0.4;sx=0.6;}
                else if(name==='ogigia'){fm=2;fx=3;sm=0.3;sx=0.5;}
                else if(name==='troya'){fm=1.5;fx=2;sm=0.2;sx=0.4;}
            }
            const fy=rF(fm,fx);
            const obj=gltf.scene.clone(true);
            obj.position.set(bp.x,bp.y+fy,bp.z);
            const sc=sm+R()*(sx-sm);
            obj.scale.set(sc,sc,sc);
            obj.rotation.set((R()-0.5)*0.08,rY(),(R()-0.5)*0.08);
            obj.traverse(n=>{
                n.userData.assetKey=assetKey;
                if(n.isMesh){
                    n.castShadow=false;n.receiveShadow=false;
                    if(n.material){n.material.transparent=true;n.material.opacity=0.88;}
                }
            });
            scene.add(obj);
        }else{
            const isCoin=assetKey==='coin_stack_large';
            const sc=isCoin?0.2+R()*0.2:0.4+R()*0.3;
            const obj=gltf.scene.clone(true);
            obj.position.set(bp.x,0.01,bp.z);
            obj.scale.set(sc,sc,sc);
            obj.rotation.y=rY();
            obj.traverse(n=>{
                n.userData.assetKey=assetKey;
                if(n.isMesh){n.castShadow=true;n.receiveShadow=true;}
            });
            scene.add(obj);
        }
    }
}

/* ─────────────────────────────────────────────────────
   LABELS — canvas sprites for place names & characters
   ───────────────────────────────────────────────────── */
function createLabel(text,isBold,color='#c0d8e8'){
    const c=document.createElement('canvas');
    c.width=512;c.height=64;
    const cx=c.getContext('2d');
    // Rounded rect background
    const r=6;
    cx.beginPath();cx.moveTo(4+r,4);cx.lineTo(508-r,4);
    cx.quadraticCurveTo(508,4,508,4+r);cx.lineTo(508,60-r);
    cx.quadraticCurveTo(508,60,508-r,60);cx.lineTo(4+r,60);
    cx.quadraticCurveTo(4,60,4,60-r);cx.lineTo(4,4+r);
    cx.quadraticCurveTo(4,4,4+r,4);cx.closePath();
    cx.fillStyle='rgba(8,6,14,0.6)';cx.fill();
    
    cx.font=isBold?'bold 22px Georgia':'16px Georgia';
    cx.textAlign='center';cx.textBaseline='middle';
    cx.fillStyle=color;cx.fillText(text,256,32);
    const tx=new THREE.CanvasTexture(c);
    tx.minFilter=THREE.LinearFilter;
    const sp=new THREE.Sprite(new THREE.SpriteMaterial({map:tx,transparent:true,depthWrite:false}));
    sp.scale.set(isBold?2.2:1.3,isBold?0.28:0.2,1);
    return sp;
}

function placeLabels(){
    // Biome labels (bold)
    const biomeLabels=[
        {q:0,r:0,text:'Olympus',bold:true,color:'#c0a050'},
        {q:8,r:0,text:'Ithaca',bold:true,color:'#4a9a3a'},
        {q:-5,r:5,text:'Ogygia',bold:true,color:'#3a7aba'},
        {q:12,r:-4,text:'Troy',bold:true,color:'#8a5a3a'},
        {q:5,r:3,text:'Pylos',bold:false,color:'#b8a070'},
        {q:7,r:5,text:'Sparta',bold:false,color:'#7a6a4a'},
        {q:3,r:-2,text:'Taphos',bold:false,color:'#6a9a5a'}
    ];
    biomeLabels.forEach(l=>{
        const p=axialToWorld(l.q,l.r);
        p.x+=4;p.y=0.7;
        const sp=createLabel(l.text,l.bold,l.color);
        sp.position.copy(p);
        scene.add(sp);
    });

    // Character labels (smaller, italic style)
    const charLabels=[
        {q:0,r:0,text:'Jupiter',color:'#c0d8e8'},{q:0,r:1,text:'Minerva',color:'#7ab0e0'},
        {q:1,r:0,text:'Mercury',color:'#f0c060'},{q:9,r:0,text:'Telemachus'},
        {q:9,r:-1,text:'Penelope'},{q:7,r:0,text:'Antinous',color:'#e07050'},
        {q:8,r:-1,text:'Phemius'},{q:-5,r:6,text:'Calypso',color:'#e8a0bf'},
        {q:-4,r:5,text:'Odysseus',color:'#c0d8e8'},{q:7,r:5,text:'Menelaus'},
        {q:5,r:3,text:'Nestor'}
    ];
    charLabels.forEach(l=>{
        const p=axialToWorld(l.q,l.r);
        p.x+=4;p.y=0.5;
        const sp=createLabel(l.text,false,l.color||'#8aa0b0');
        sp.position.copy(p);
        scene.add(sp);
    });
    log('✔ Labels placed','dim');
}

/* ─────────────────────────────────────────────────────
   INTERACTION — click to inspect
   ───────────────────────────────────────────────────── */
const raycaster=new THREE.Raycaster();
const mouse=new THREE.Vector2();

function setupInteraction(){
    window.addEventListener('click',e=>{
        if(modalOverlay.classList.contains('active')) return;
        mouse.x=(e.clientX/innerWidth)*2-1;
        mouse.y=-(e.clientY/innerHeight)*2+1;
        raycaster.setFromCamera(mouse,cam);
        const hits=raycaster.intersectObjects(scene.children,true);
        if(!hits.length) return;

        let node=hits[0].object;
        while(node.parent&&!node.userData.assetKey) node=node.parent;
        const ak=node?.userData?.assetKey;
        if(!ak||!ASSET_DB[ak]) return;

        const data=ASSET_DB[ak];
        pTitle.textContent=data.title;
        pDesc.textContent=data.desc;
        pStats.innerHTML='';
        Object.entries(data.stats).forEach(([k,v])=>{
            const tr=document.createElement('tr');
            tr.innerHTML='<td>'+k+'</td><td class=stat-val>'+v+'</td>';
            pStats.appendChild(tr);
        });
        modalOverlay.classList.add('active');
    });

    closeBtn.addEventListener('click',()=>modalOverlay.classList.remove('active'));
    modalOverlay.addEventListener('click',e=>{if(e.target===modalOverlay) modalOverlay.classList.remove('active');});
    log('✔ Interaction ready','dim');
}

    cam.aspect=innerWidth/innerHeight;
    cam.updateProjectionMatrix();

/* ─────────────────────────────────────────────────────
   MAIN ENTRY
   ───────────────────────────────────────────────────── */
async function main(){
    const t0=performance.now();
    log('κ Weaving Cute Okeanos World…','dim');sep();

    buildOkeanosDisc();
    sep();

    const assets=await loadAllAssets();
    log('✔ '+assets.loaded+' GLTFs · '+assets.errors+' errors · '+(assets.totalBytes/1024).toFixed(0)+' KB','ok');
    sep();

    log('ϟ Building hex tiles (Layer 0)…','dim');
    buildInstancedTiles();
    sep();

    log('ϟ Placing Alpha Anchors (Layer 2)…','dim');
    let anchors=0,beta=0;
    CELLS.forEach(c=>{
        if(!c.occ) return;
        if(!isValid(c,c.occ,'L2')) return;
        if(placeOccupant(c,c.occ)){
            const isA=['building_castle_green','building_bridge_B','building_destroyed','mountain_B_grass_trees'].includes(c.occ);
            if(isA) anchors++; else beta++;
        }
    });
    log('✔ '+anchors+' anchors · '+beta+' beta occupants','ok');
    sep();

    log('ϟ Scattering environment (Layer 1)…','dim');
    let ci=0,gr=0;
    CELLS.forEach(c=>{
        if(!c.env||!c.env.length) return;
        const prevCount=scene.children.length;
        placeEnvironment(c);
        // Rough count (not perfect but gives idea)
        if(c.occ||c.env.length>2) ci++; else gr++;
    });
    log('✔ Environment scattered','ok');
    sep();

    log('ϟ Adding labels…','dim');
    placeLabels();
    sep();

    const dt=((performance.now()-t0)/1000).toFixed(1);
    log('Χ '+dt+'s · ~'+scene.children.length+' objects · '+assets.loaded+' asset types','ok');
    log('Χ Cute Okeanos World · Flat hex + Disc platform','dim');
    sep();
    log('✔ World Complete · Click any object to inspect','ok');

    setupInteraction();
}

/* ─────────────────────────────────────────────────────
   ANIMATION LOOP
   ───────────────────────────────────────────────────── */
const fpsEl=document.getElementById('fps');
let lastTime=performance.now(),frames=0;

ren.setAnimationLoop(()=>{
    ct.update();
    ren.render(scene,cam);
    frames++;
    const now=performance.now();
    if(now-lastTime>=1000){
        fpsEl.textContent=frames+' fps';
        fpsEl.style.color=frames>=50?'#7aaf6a':frames>=25?'#c9a84c':'#c95a4c';
        frames=0;lastTime=now;
    }
});

main().catch(e=>{sep();log('☠ '+e.message,'err');console.error(e);});
