<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diorama Jerárquico</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #1a252c; font-family: 'Segoe UI', sans-serif; color: #ecf0f1; }
        #landing { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, #1e272c 0%, #070b0d 100%); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; transition: opacity 1s ease-in-out; }
        #landing.fade-out { opacity: 0; pointer-events: none; }
        .landing-content { max-width: 600px; text-align: center; padding: 0 20px; }
        .landing-content h1 { font-size: 2.8rem; font-weight: 300; letter-spacing: 3px; margin-bottom: 20px; color: #2ecc71; text-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .landing-content p { font-size: 1.05rem; line-height: 1.6; color: #a6b1b9; margin-bottom: 40px; }
        #start-btn { padding: 15px 45px; font-size: 1.1rem; font-weight: bold; color: #fff; background-color: #27ae60; border: none; border-radius: 30px; cursor: pointer; box-shadow: 0 4px 15px rgba(39, 174, 96, 0.4); transition: all 0.3s ease; }
        #start-btn:hover { background-color: #219653; transform: translateY(-2px); box-shadow: 0 6px 20px rgba(39, 174, 96, 0.6); }
        #info-overlay { position: absolute; top: 20px; width: 100%; text-align: center; pointer-events: none; opacity: 0; transition: opacity 1s ease 1s; text-shadow: 0 2px 5px rgba(0,0,0,0.9); z-index: 50; }
        #info-overlay h2 { margin: 0; font-weight: 400; color: #2ecc71; }
    </style>
</head>
<body>

    <div id="landing">
        <div class="landing-content">
            <h1>El Reino del Castillo Verde</h1>
            <p>Descubre este diorama estructurado por capas. Hexágonos base, decoración natural, construcciones humanas y nubes flotantes conforman este hermoso paisaje interactivo.</p>
            <button id="start-btn">Cargar Reino</button>
        </div>
    </div>

    <div id="info-overlay">
        <h2>Jerarquía de Capas Activa</h2>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        document.getElementById('start-btn').addEventListener('click', (e) => {
            e.target.textContent = "Cargando componentes...";
            e.target.style.pointerEvents = "none";
            initDiorama();
        });

        const initDiorama = () => {
            const scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x1a252c, 0.03);

            const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
            camera.position.set(0, 10, 14); // Cámara más alta para ver las montañas y nubes

            const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.outputColorSpace = THREE.SRGBColorSpace;
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            document.body.appendChild(renderer.domElement);

            const controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.maxPolarAngle = Math.PI / 2.1;

            const ambientLight = new THREE.AmbientLight(0xffffff, 1.2);
            scene.add(ambientLight);

            const sunLight = new THREE.DirectionalLight(0xfff4e0, 2.5);
            sunLight.position.set(8, 15, 10);
            scene.add(sunLight);

            // Lista actualizada de assets a precargar
            const uniqueFiles = [
                'hex_grass.gltf', 'hex_river_A.gltf', 'hex_road_A.gltf', // Nivel 1: Tiles
                'mountain_B_grass_trees.gltf', // Nivel 2: Naturaleza
                'building_bridge_A.gltf', 'building_grain.gltf', 'building_destroyed.gltf', 
                'building_castle_green.gltf', 'coin_stack_large.gltf', // Nivel 3: Edificios
                'cloud_big.gltf' // Extra: Cielo
            ];

            const cache = new Map();
            const loader = new GLTFLoader();
            let loadedFilesCount = 0;

            uniqueFiles.forEach(fileName => {
                loader.load(fileName, (gltf) => {
                    cache.set(fileName, gltf.scene);
                    loadedFilesCount++;
                    if (loadedFilesCount === uniqueFiles.length) {
                        buildWorld(scene, cache);
                        revelarInterfaz();
                    }
                }, undefined, (err) => console.error("Error al precargar:", fileName, err));
            });

            // --- LÓGICA DE JERARQUÍA Y CONSTRUCCIÓN ---
            function buildWorld(targetScene, templates) {
                
                // MAPA DE CELDAS: Estructura de capas
                const mapData = [
                    // Fila Posterior (Montañas y Castillo)
                    { x: -2, z: -3.4, tile: 'hex_grass.gltf', deco: 'mountain_B_grass_trees.gltf' },
                    { x:  0, z: -3.4, tile: 'hex_grass.gltf', deco: 'mountain_B_grass_trees.gltf', building: 'building_castle_green.gltf', buildingY: 0.8 }, // ¡Jerarquía Completa! Elevamos el castillo para que suba a la montaña
                    { x:  2, z: -3.4, tile: 'hex_grass.gltf', deco: 'mountain_B_grass_trees.gltf' },

                    // Fila Media-Atrás (Caminos y ruinas)
                    { x: -2, z: -1.7, tile: 'hex_grass.gltf', building: 'building_destroyed.gltf' },
                    { x:  0, z: -1.7, tile: 'hex_road_A.gltf' }, // Un camino hacia el castillo
                    { x:  2, z: -1.7, tile: 'hex_grass.gltf', building: 'building_grain.gltf' },

                    // Fila Central (El Río)
                    { x: -2, z: 0, tile: 'hex_river_A.gltf' },
                    { x:  0, z: 0, tile: 'hex_river_A.gltf', building: 'building_bridge_A.gltf' }, // Puente sobre el río
                    { x:  2, z: 0, tile: 'hex_river_A.gltf' },

                    // Fila Delantera (Inicio del camino)
                    { x: -2, z: 1.7, tile: 'hex_grass.gltf' },
                    { x:  0, z: 1.7, tile: 'hex_road_A.gltf' },
                    { x:  2, z: 1.7, tile: 'hex_grass.gltf', building: 'coin_stack_large.gltf' }
                ];

                // Función auxiliar para colocar clones en la escena
                const placeItem = (key, x, y, z) => {
                    if(!key) return; // Si no hay modelo, ignoramos
                    const instance = templates.get(key).clone();
                    instance.position.set(x, y, z);
                    targetScene.add(instance);
                };

                // Iteramos por nuestra estructura de jerarquías
                mapData.forEach(cell => {
                    // 1. Nivel Base (Tiles siempre en Y=0)
                    placeItem(cell.tile, cell.x, 0, cell.z);

                    // 2. Nivel Naturaleza (Decoración sobre los tiles)
                    placeItem(cell.deco, cell.x, 0, cell.z);

                    // 3. Nivel Construcción (Edificios. Si tienen "buildingY", los elevamos. Si no, en Y=0)
                    const bY = cell.buildingY !== undefined ? cell.buildingY : 0;
                    placeItem(cell.building, cell.x, bY, cell.z);
                });

                // NUBES: Capa especial flotante (Eje Y alto)
                placeItem('cloud_big.gltf', -3.5, 4.0, -1.0);
                placeItem('cloud_big.gltf',  3.5, 4.5, -2.5);
                placeItem('cloud_big.gltf', -1.0, 5.0,  3.0);
            }

            function revelarInterfaz() {
                const landing = document.getElementById('landing');
                landing.classList.add('fade-out');
                document.getElementById('info-overlay').style.opacity = "1";
                setTimeout(() => landing.remove(), 1000);
            }

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });

            const animate = () => {
                requestAnimationFrame(animate);
                controls.update();
                renderer.render(scene, camera);
            };
            animate();
        };
    </script>
</body>
</html>
