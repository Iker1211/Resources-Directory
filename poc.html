<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KayKit PoC — InstancedMesh</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0d0f1a; overflow: hidden; font-family: 'Courier New', monospace; }
    canvas { display: block; }
    #hud {
      position: fixed; top: 16px; left: 16px; z-index: 10;
      background: rgba(0,0,0,0.78); border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px; padding: 14px 18px;
      font-size: 12px; line-height: 2;
      min-width: 300px; max-width: 360px; color: #c9d1d9;
    }
    #hud b { color: #e6edf3; font-size: 13px; }
    .ok   { color: #3fb950; }
    .warn { color: #d29922; }
    .err  { color: #f85149; }
    .dim  { color: #6e7681; }
    #fps {
      position: fixed; top: 16px; right: 16px; z-index: 10;
      background: rgba(0,0,0,0.78); border: 1px solid rgba(255,255,255,0.08);
      border-radius: 6px; padding: 6px 14px;
      font-family: 'Courier New', monospace; font-size: 13px; color: #3fb950;
    }
    #hint {
      position: fixed; bottom: 14px; left: 50%; transform: translateX(-50%);
      font-size: 11px; color: rgba(255,255,255,0.2);
      font-family: 'Courier New', monospace; white-space: nowrap;
    }
  </style>
</head>
<body>
<div id="hud"><b>KayKit PoC — InstancedMesh</b><div id="log"><span class="dim">Inicializando…</span></div></div>
<div id="fps">-- fps</div>
<div id="hint">Orbitar: clic · Zoom: scroll · Pan: clic der</div>

<script type="importmap">
{ "imports": {
    "three":         "https://cdn.jsdelivr.net/npm/three@0.168.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.168.0/examples/jsm/"
} }
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader }    from 'three/addons/loaders/GLTFLoader.js';

// ── ASSETS (rutas relativas desde la raíz del repo) ──────
const HEX_TILES = [
  { gltf: 'hex_grass.gltf',   bin: 'hex_grass.bin',   label: 'hex_grass'   },
  { gltf: 'hex_river_A.gltf', bin: 'hex_river_A.bin', label: 'hex_river_A' },
  { gltf: 'hex_road_A.gltf',  bin: 'hex_road_A.bin',  label: 'hex_road_A'  },
];
const BUILDINGS = [
  { gltf: 'building_castle_green.gltf', bin: 'building_castle_green.bin', label: 'castle_green'  },
  { gltf: 'building_dirt.gltf',         bin: 'building_dirt.bin',         label: 'building_dirt' },
  { gltf: 'mountain_B_grass_trees.gltf',bin: 'mountain_B_grass_trees.bin',label: 'mountain_B'    },
];
const INSTANCES = 80;
const COLS      = 10;
const HEX_W     = 1.82;
const HEX_H     = 1.575;

// ── LOG ──────────────────────────────────────────────────
const logEl = document.getElementById('log');
const lines = [];
function L(t, c = '') { lines.push(`<span class="${c}">${t}</span>`); logEl.innerHTML = lines.join('<br>'); }
function SEP() { L('<span style="color:#30363d">──────────────────────────</span>'); }

// ── SCENE ────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

const scene  = new THREE.Scene();
scene.background = new THREE.Color(0x0d0f1a);
scene.fog = new THREE.FogExp2(0x0d0f1a, 0.022);

const camera = new THREE.PerspectiveCamera(52, innerWidth / innerHeight, 0.1, 200);
camera.position.set(0, 14, 18);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.06;

// Luces — sin Object.assign, todo explícito
const ambient = new THREE.AmbientLight(0x8fb0d0, 0.9);
scene.add(ambient);

const sun = new THREE.DirectionalLight(0xffe5b0, 1.6);
sun.position.set(10, 20, 12);
sun.castShadow = true;
sun.shadow.mapSize.width  = 1024;
sun.shadow.mapSize.height = 1024;
sun.shadow.camera.left   = -22;
sun.shadow.camera.right  =  22;
sun.shadow.camera.top    =  22;
sun.shadow.camera.bottom = -22;
sun.shadow.camera.near   =  1;
sun.shadow.camera.far    =  60;
sun.shadow.camera.updateProjectionMatrix();
scene.add(sun);

const fill = new THREE.DirectionalLight(0x5580a0, 0.35);
fill.position.set(-6, 6, -10);
scene.add(fill);

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

// ── HEX GRID ─────────────────────────────────────────────
function hexGrid(count, cols, offsetZ) {
  const pts = [];
  for (let i = 0; i < count; i++) {
    const col = i % cols;
    const row = Math.floor(i / cols);
    pts.push(new THREE.Vector3(
      (col - cols / 2) * HEX_W + (row % 2 === 0 ? 0 : HEX_W * 0.5),
      0,
      row * HEX_H + (offsetZ || 0)
    ));
  }
  return pts;
}

// ── MEDIR PESO ───────────────────────────────────────────
async function measurePair(gltfPath, binPath) {
  try {
    const [a, b] = await Promise.all([fetch(gltfPath), fetch(binPath)]);
    const [ab, bb] = await Promise.all([a.arrayBuffer(), b.arrayBuffer()]);
    return ab.byteLength + bb.byteLength;
  } catch (_) { return 0; }
}

// ── LOAD GLTF ────────────────────────────────────────────
const loader = new GLTFLoader();
function loadGLTF(path) {
  return new Promise((res, rej) =>
    loader.load(path, res, undefined, e => rej(new Error(e.message || 'load error')))
  );
}

// ── INSTANCED MESH ───────────────────────────────────────
function buildInstanced(gltf, positions) {
  const meshes = [];
  gltf.scene.traverse(c => { if (c.isMesh) meshes.push(c); });
  if (!meshes.length) throw new Error('0 meshes en la escena');

  const group = new THREE.Group();
  const dummy = new THREE.Object3D();

  meshes.forEach(src => {
    const inst = new THREE.InstancedMesh(src.geometry, src.material, positions.length);
    inst.castShadow    = true;
    inst.receiveShadow = true;
    positions.forEach((pos, i) => {
      dummy.position.copy(pos);
      dummy.rotation.y = ((i * 7) % 6) * (Math.PI / 3);
      dummy.updateMatrix();
      inst.setMatrixAt(i, dummy.matrix);
    });
    inst.instanceMatrix.needsUpdate = true;
    group.add(inst);
  });

  scene.add(group);
  return meshes.length;
}

// ── BUILDING MESH ────────────────────────────────────────
function placeBuilding(gltf, pos) {
  const obj = gltf.scene.clone(true);
  obj.position.copy(pos);
  obj.position.y += 0.14;
  obj.traverse(c => { if (c.isMesh) { c.castShadow = true; c.receiveShadow = true; } });
  scene.add(obj);
}

// ── MAIN ─────────────────────────────────────────────────
async function main() {
  const t0 = performance.now();
  let totalBytes = 0, totalDrawCalls = 0;

  // 1. HEX TILES → InstancedMesh
  L('Cargando hex tiles → InstancedMesh…', 'dim');
  const hexResults = await Promise.allSettled(
    HEX_TILES.map(async (m, i) => {
      const t1 = performance.now();
      const [bytes, gltf] = await Promise.all([measurePair(m.gltf, m.bin), loadGLTF(m.gltf)]);
      const ms = (performance.now() - t1).toFixed(0);
      const offsetZ = (i - 1) * (Math.ceil(INSTANCES / COLS) * HEX_H + 2);
      const positions = hexGrid(INSTANCES, COLS, offsetZ);
      const subCount = buildInstanced(gltf, positions);
      return { label: m.label, bytes, ms, subCount, positions };
    })
  );

  SEP();
  let samplePositions = [];
  hexResults.forEach((r, i) => {
    if (r.status === 'rejected') { L(`✗ ${HEX_TILES[i].label}: ${r.reason.message}`, 'err'); return; }
    const { label, bytes, ms, subCount, positions } = r.value;
    totalBytes += bytes;
    totalDrawCalls += subCount;
    if (!samplePositions.length) samplePositions = positions;
    L(`✔ ${label}`, 'ok');
    L(`  ${(bytes/1024).toFixed(1)} KB · ${ms}ms · ${subCount} sub-mesh(es)`, 'dim');
  });

  // 2. BUILDINGS → Mesh normal
  SEP();
  L('Cargando buildings…', 'dim');
  const bldResults = await Promise.allSettled(
    BUILDINGS.map(async (m, i) => {
      const t1 = performance.now();
      const [bytes, gltf] = await Promise.all([measurePair(m.gltf, m.bin), loadGLTF(m.gltf)]);
      const ms = (performance.now() - t1).toFixed(0);
      if (samplePositions[i * 15]) placeBuilding(gltf, samplePositions[i * 15]);
      totalBytes += bytes;
      totalDrawCalls += 1;
      return { label: m.label, bytes, ms };
    })
  );

  SEP();
  bldResults.forEach((r, i) => {
    if (r.status === 'rejected') { L(`✗ ${BUILDINGS[i].label}: ${r.reason.message}`, 'err'); return; }
    const { label, bytes, ms } = r.value;
    L(`✔ ${label} — ${(bytes/1024).toFixed(1)} KB · ${ms}ms`, 'ok');
  });

  // 3. RESUMEN
  SEP();
  const hexOk = hexResults.filter(r => r.status === 'fulfilled').length;
  const bldOk = bldResults.filter(r => r.status === 'fulfilled').length;
  const wouldBe = hexOk * INSTANCES * 3;
  L(`Tiempo total:   ${(performance.now() - t0).toFixed(0)} ms`, 'ok');
  L(`Peso total:     ${(totalBytes/1024).toFixed(0)} KB`, 'ok');
  L(`Hex ok: ${hexOk}/${HEX_TILES.length}  ·  Buildings ok: ${bldOk}/${BUILDINGS.length}`, hexOk === HEX_TILES.length ? 'ok' : 'warn');
  SEP();
  L(`Draw calls reales:  ${totalDrawCalls}`, 'ok');
  L(`Sin instancing:     ~${wouldBe}`, 'dim');
  L(`Reducción:          ${Math.round((1 - totalDrawCalls/wouldBe)*100)}%`, 'ok');
  SEP();
  L('renderer.info detallado → F12 consola', 'dim');

  setTimeout(() => {
    console.group('%cKayKit PoC — renderer.info', 'color:#3fb950;font-weight:bold');
    console.log('render.calls      :', renderer.info.render.calls);
    console.log('render.triangles  :', renderer.info.render.triangles);
    console.log('memory.geometries :', renderer.info.memory.geometries);
    console.log('memory.textures   :', renderer.info.memory.textures);
    console.groupEnd();
  }, 1000);
}

// ── RENDER LOOP ──────────────────────────────────────────
const fpsBadge = document.getElementById('fps');
let lastT = performance.now(), frames = 0;
renderer.setAnimationLoop(() => {
  controls.update();
  renderer.render(scene, camera);
  frames++;
  const now = performance.now();
  if (now - lastT >= 1000) {
    fpsBadge.textContent = `${frames} fps`;
    fpsBadge.style.color = frames >= 55 ? '#3fb950' : frames >= 30 ? '#d29922' : '#f85149';
    frames = 0; lastT = now;
  }
});

main().catch(err => { SEP(); L(`Error fatal: ${err.message}`, 'err'); console.error(err); });
</script>
</body>
</html>
